  target-bringup-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Compile Stage 27 bring-up target
        run: pio run -e lilygo_t3_v161_bringup
      - name: Compile Stage 29/30 bench/web target
        run: pio run -e lilygo_t3_v161_bench_web
