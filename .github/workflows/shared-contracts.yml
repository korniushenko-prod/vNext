name: shared-contracts

on:
  push:
    branches:
      - main
      - vnext
  pull_request:

jobs:
  shared-contracts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@universal-plc/project-schema"
          - "@universal-plc/runtime-pack-schema"
          - "@universal-plc/target-adapter-contracts"
          - "@universal-plc/materializer-core"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared contracts
        run: |
          pnpm --filter @universal-plc/project-schema run build
          pnpm --filter @universal-plc/runtime-pack-schema run build
          pnpm --filter @universal-plc/target-adapter-contracts run build
          pnpm --filter @universal-plc/materializer-core run build

      - name: Type check
        run: pnpm --filter "${{ matrix.package }}" run check

      - name: Test
        run: pnpm --filter "${{ matrix.package }}" run test