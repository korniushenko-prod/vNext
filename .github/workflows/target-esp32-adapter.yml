name: target-esp32-adapter

on:
  push:
    branches:
      - main
      - vnext
  pull_request:

jobs:
  esp32-target-adapter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build dependencies
        run: |
          pnpm --filter @universal-plc/runtime-pack-schema run build
          pnpm --filter @universal-plc/target-adapter-contracts run build
          pnpm --filter @universal-plc/esp32-target-adapter run build

      - name: Type check
        run: pnpm --filter @universal-plc/esp32-target-adapter run check

      - name: Test
        run: pnpm --filter @universal-plc/esp32-target-adapter run test