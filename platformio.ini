; Stage 27 regression compile target retained for RC validation.
[env:lilygo_t3_v161_bringup]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
build_flags =
  -DBRINGUP_DEFAULT_STA_ENABLED=1
  -DBRINGUP_DEFAULT_STA_SSID=\"Infinity-Starlink\"
  -DBRINGUP_DEFAULT_STA_PASSWORD=\"\"
  -DBRINGUP_DEFAULT_AP_ENABLED=1
  -DBRINGUP_DEFAULT_AP_SSID=\"vNext-Bringup\"
  -DBRINGUP_DEFAULT_AP_PASSWORD=\"\"
  -DBRINGUP_EXPECTED_FLASH_MB=4

; Stage 29/30 browser-and-bench target.
; The env name stays unchanged for continuity with earlier docs and CI.
[env:lilygo_t3_v161_bench_web]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
board_upload.flash_size = 4MB
board_upload.maximum_size = 1966080
board_build.partitions = partitions_stage28_bench_web.csv
build_flags =
  -DBRINGUP_DEFAULT_STA_ENABLED=1
  -DBRINGUP_DEFAULT_STA_SSID=\"Infinity-Starlink\"
  -DBRINGUP_DEFAULT_STA_PASSWORD=\"\"
  -DBRINGUP_DEFAULT_AP_ENABLED=1
  -DBRINGUP_DEFAULT_AP_SSID=\"vNext-Bringup\"
  -DBRINGUP_DEFAULT_AP_PASSWORD=\"\"
  -DBRINGUP_EXPECTED_FLASH_MB=4
  -DBRINGUP_ENABLE_WEB=1
  -DBRINGUP_HTTP_PORT=80
  -DBRINGUP_BENCH_MODE=0
  -DBRINGUP_TEST_RELAY_PIN=-1
  -DBRINGUP_TEST_DI_PIN=-1
  -DBRINGUP_TEST_PWM_PIN=-1
  -DBRINGUP_TEST_PULSE_PIN=-1
  -DBRINGUP_TEST_AI_PIN=-1
